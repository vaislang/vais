[entry]
id = "A4-15"
classification = "A4 silent surface (runtime corruption — stack-after-return)"
surface = "Escape closure: closure returned from function and called later loses captured environment"
site = "vais-codegen closure lowering — capture frame allocated on caller stack, freed at return"
master_plan_version = 36
proposed_reclassification = "ADD to [phase.A4.runtime_silent] — not previously in master-plan inventory"

[v1_evidence]
probe_summary = "fn make_adder(x) returns closure |n| n + x. main captures add5 then calls add5(37). Closure should compute 37 + 5 = 42."
expected_per_design = "exit 42 (well-typed escape closure preserving captured x=5)"
actual_observed = "exit ≠ 42 (macOS arm64, vaisc release build, 2026-05-08 measured exit=45). Specific value varies across builds — classic stack-after-return corruption."
verified_date = "2026-05-08"

[v2_evidence]
status = "hard_block_landed"
notes = """
History: F-18 (STEP7_FINDINGS, 2026-05-04) discovered this during A2-04 inline-closure promotion. v37 (loop 32) inventoried as A4-15 with assertion_kind=exit_not. v39 (loop 34) hard-blocked at TC level — escape closure detector at vais-types/checker_expr/stmts.rs::Stmt::Return + vais-types/checker_fn.rs::check_function trailing-expression branch. Probe now rejects with E001 'expected named function pointer or capture-free closure, found escape closure capturing N variable(s)'. Opt-out via VAIS_REJECT_A4_15=0.

baseline impact measurement before LANDED: std=0/82, LIVING_SPEC=0/117, vaisdb 11/282 (= prior baseline; A4-15 introduced 0 new failures). escape closure form has zero baseline use across std + lang/packages + LIVING_SPEC.

A2-04 (inline closure) is certified as A2 — the inline form (apply(|n| n+1, 41) = 42 deterministically) does NOT reach return position. Escape form (return |params| body with non-empty captures) crosses the return boundary; this is what the new detector rejects.
"""

[migration]
proposal = """
Master-plan v37 (next revision) should:
  1. Add A4-15 to [[phase.A4.runtime_silent]] with this fixture as v1 evidence.
  2. Bump phase.A4.runtime_silent_count and total accordingly.

Codemod / compiler fix path: closure escape detection in TC. Either:
  (a) reject escape closures at type-check (block surface entirely until codegen supports heap-allocated capture frame).
  (b) heap-allocate capture frame for escape closures (real fix; ties to Step 16 memory protocol).

A2-04 certified subset (inline closures) is unaffected by either path.
"""

[assertion_kind]
kind = "check_fails"
required_stderr_patterns = ["E001", "escape closure", "A4-15"]
rationale = """
Hard-blocked at TC layer (loop 34, master-plan v39). The probe now rejects with E001 mentioning the escape-closure name + A4-15 marker. Opt-out via VAIS_REJECT_A4_15=0 retains legacy silent accept for legacy harness; the default rejects.
"""
