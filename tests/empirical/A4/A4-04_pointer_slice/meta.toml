# A4-04 — Pointer<T> ↔ Slice<T>/SliceMut<T> (Phase 162)

[entry]
id = "A4-04"
classification = "A4-runtime-silent"
surface = "Raw pointer *u8 silently unified with &[u8] slice in function call (auto-coercion added in Phase 162)"
