[entry]
id = "A3-01"
classification = "A3 quarantine (intended-but-unfinished public API)"
surface = "grpc API in vais-server (lang/packages/vais-server/src/api/grpc.vais)"
import_form = "server/api/grpc"
filesystem_path = "lang/packages/vais-server/src/api/grpc.vais"
master_plan_version = 16

[v1_evidence]
probe_summary = "U server/api/grpc; F main() -> i64 { R 0 }"
expected_per_design = "vaisc check rejects with stable error[CODE] (master-plan v16 Step 11 deliverable)"
actual_observed_default = "warning + fallback + exit 0 (silent fallback per STEP11_FINDINGS F-A3-01)"
actual_observed_strict = "exit 1, error[E_IMPORT_NOT_FOUND]"
verified_date = "2026-05-03"

[v2_evidence]
status = "v1_reverified_under_strict_mode"
notes = """
Default behaviour (env unset): warning + fallback. Strict mode
(VAIS_STRICT_IMPORTS=1): hard error E_IMPORT_NOT_FOUND. The fixture
runs in strict mode so the documented A3 quarantine path is what's
asserted.

v2 contract requires 3 distinct probes for HARD v2 status. Pending
probes:
  - graphql import (separate A3 surface)
  - ws/handler import (directory module form)
  - vaisdb security/* import (lang/packages/vaisdb/src/security/)
"""

[migration]
post_certification_expected = "If grpc is certified later, the import resolves and `vaisc check` exits 0. Migrate fixture to a positive form proving the certified surface, OR remove fixture if A3-01 graduates out of A3 entirely."

[assertion_kind]
kind = "check_fails"
required_env = { VAIS_STRICT_IMPORTS = "1" }
required_stderr_patterns = ["E_IMPORT_NOT_FOUND", "grpc"]
rationale = """
E_IMPORT_NOT_FOUND is the stable error code introduced by Step 11
unblock (compiler change in commit <pending>). 'grpc' confirms the
diagnostic mentions the actual surface name, not just a generic
import failure.
"""
