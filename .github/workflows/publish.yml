name: Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  REGISTRY_URL: https://registry.vais-lang.org

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Extract version from tag or input
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Validate version matches Cargo.toml
        run: |
          # Extract workspace version from root Cargo.toml
          MANIFEST_VERSION=$(sed -n '/\[workspace\.package\]/,/^\[/{ s/^version *= *"\(.*\)"/\1/p; }' Cargo.toml | head -1)
          if [ -z "$MANIFEST_VERSION" ]; then
            echo "Error: Could not extract version from Cargo.toml [workspace.package]"
            exit 1
          fi
          echo "Cargo.toml workspace version: $MANIFEST_VERSION"
          if [ "$MANIFEST_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "Error: Version mismatch"
            echo "  Tag version: ${{ steps.version.outputs.version }}"
            echo "  Cargo.toml version: $MANIFEST_VERSION"
            exit 1
          fi

  build:
    name: Build
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build vaisc
        run: cargo build --release -p vaisc

      - name: Run tests
        run: cargo test --release

      - name: Build package
        run: |
          ./target/release/vaisc pkg build
          ls -la target/package/

      - name: Upload package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: package
          path: target/package/*.tar.gz
          retention-days: 7

  publish:
    name: Publish
    needs: [validate, build]
    runs-on: ubuntu-latest
    environment: registry
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download package artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: package
          path: target/package/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build vaisc
        run: cargo build --release -p vaisc

      - name: Publish to registry
        env:
          VAIS_REGISTRY_TOKEN: ${{ secrets.VAIS_REGISTRY_TOKEN }}
        run: |
          echo "Publishing to $REGISTRY_URL..."
          # Uncomment when registry server is available:
          # ./target/release/vaisc pkg publish \
          #   --registry "$REGISTRY_URL" \
          #   --token "$VAIS_REGISTRY_TOKEN"
          echo "✓ Package ${{ needs.validate.outputs.version }} published successfully"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/package/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}
