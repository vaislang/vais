name: Release Archives

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish archives for"
        required: true
        type: string

permissions:
  contents: write

jobs:
  archive:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
          - label: darwin-arm64
            os: macos-14
          - label: darwin-x64
            os: macos-15-intel

    steps:
      - name: Resolve tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Build archive
        shell: bash
        run: scripts/package-vaisc-release.sh

      - name: Smoke packaged compiler and checker
        shell: bash
        run: |
          archive="$(ls dist/vais-*.tar.gz | head -1)"
          tmp="$(mktemp -d)"
          tar -C "$tmp" -xzf "$archive"
          packaged="$(find "$tmp" -path '*/bin/vaisc' -type f | head -1)"
          packaged_check="$(find "$tmp" -path '*/bin/vais-check' -type f | head -1)"
          "$packaged" --version
          cat > "$tmp/smoke.vais" <<'SRC'
          fn main() -> Int {
              return 42
          }
          SRC
          set +e
          "$packaged" run "$tmp/smoke.vais"
          rc=$?
          set -e
          if [ "$rc" != "42" ]; then
            echo "expected run exit 42, got $rc" >&2
            exit 1
          fi
          "$packaged_check" "$tmp/smoke.vais"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "Vais $TAG" --notes "Automated Vais release archives for $TAG."
          fi

      - name: Upload archive
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: gh release upload "$TAG" dist/vais-*.tar.gz --clobber
