name: Fuzzing

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      duration:
        description: 'Fuzzing duration in seconds'
        required: false
        default: '300'
      target:
        description: 'Fuzz target (fuzz_lexer, fuzz_parser, fuzz_type_checker, fuzz_codegen, fuzz_full_pipeline, fuzz_mir_native_diff, all)'
        required: false
        default: 'all'

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # fuzz_mir_native_diff (Master Plan v17 §I-6 Step 17 stage 3): the
        # MIR-vs-native differential oracle. Path A (MIR interpreter) and
        # Path B (vais-jit Cranelift in-process) both LANDED 2026-05-04.
        # Nightly runs surface diff findings if the two arms disagree.
        target: [fuzz_lexer, fuzz_parser, fuzz_type_checker, fuzz_codegen, fuzz_mir_native_diff]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: |
            fuzz/corpus/
            fuzz/artifacts/
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Seed corpus from tracked seeds
        # corpus/ is gitignored; cached corpus may be empty on first run.
        # corpus_seeds/<target>/ is the tracked initial seed set. Copy any
        # missing seeds into corpus/<target>/ before fuzzing.
        run: |
          if [ -d "fuzz/corpus_seeds/${{ matrix.target }}" ]; then
            mkdir -p "fuzz/corpus/${{ matrix.target }}"
            cp -n fuzz/corpus_seeds/${{ matrix.target }}/* fuzz/corpus/${{ matrix.target }}/ 2>/dev/null || true
            echo "Seeded $(ls fuzz/corpus/${{ matrix.target }} | wc -l) entries"
          else
            echo "No tracked seeds for ${{ matrix.target }}; relying on cache + libFuzzer mutation"
          fi

      - name: Run fuzzer
        working-directory: fuzz
        run: |
          timeout ${{ github.event.inputs.duration || 300 }}s \
            cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=${{ github.event.inputs.duration || 300 }} \
            -max_len=65536 \
            || true

      - name: Check for crashes
        id: check_crashes
        run: |
          CRASH_COUNT=$(find fuzz/artifacts/${{ matrix.target }} -name 'crash-*' 2>/dev/null | wc -l || echo "0")
          echo "crash_count=$CRASH_COUNT" >> $GITHUB_OUTPUT
          if [ "$CRASH_COUNT" -gt 0 ]; then
            echo "::error::Found $CRASH_COUNT crash(es) in ${{ matrix.target }}"
          fi

      - name: Upload crash artifacts
        if: steps.check_crashes.outputs.crash_count > 0
        uses: actions/upload-artifact@v7
        with:
          name: crashes-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/crash-*
          retention-days: 30

      - name: Upload corpus
        uses: actions/upload-artifact@v7
        with:
          name: corpus-${{ matrix.target }}
          path: fuzz/corpus/${{ matrix.target }}/
          retention-days: 7

  # NOTE: workspace-wide ASAN/UBSAN job below is best-effort SUPERSEDED
  # by the dedicated .github/workflows/asan.yml + tsan.yml workflows,
  # which already gate on push/pull_request with continue-on-error: false
  # (PR-blocking) on the targeted packages (vais-lexer / vais-parser /
  # vais-ast / vais-types).
  #
  # Master Plan v17 §I-6 Step 17 stage 4:
  #   - 4a (LANDED 2026-05-04): Per-package ASAN/TSAN PR-blocking gates
  #     already exist in asan.yml/tsan.yml.
  #   - 4b (LANDED 2026-05-04): Miri PR-blocking promoted from best-effort
  #     after empirical day-1 baseline + fresh nightly 1.97 re-measurement
  #     (single-user vais repo policy: PR-block + revert on first failure
  #     rather than 7-day passive accumulation). See miri-tests job below
  #     for the comment block + revert policy.
  #
  # The workspace-wide sanitizer-tests block remains best-effort to avoid
  # double-running the same coverage with different timeouts than asan.yml.
  sanitizer-tests:
    name: Sanitizer Tests (workspace, best-effort)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Run ASAN tests
        run: |
          RUSTFLAGS="-Zsanitizer=address" \
          cargo +nightly test --workspace \
            -Zbuild-std --target x86_64-unknown-linux-gnu \
            -- --test-threads=1
        continue-on-error: true

      - name: Run UBSAN tests
        run: |
          RUSTFLAGS="-Zsanitizer=undefined" \
          cargo +nightly test --workspace \
            -Zbuild-std --target x86_64-unknown-linux-gnu \
            -- --test-threads=1
        continue-on-error: true

  miri-tests:
    # Step 17 stage 4b LANDED 2026-05-04 (B+D path):
    #
    # Promoted from best-effort (`|| true`) to PR-blocking after empirical
    # day-1 baseline confirmed false-positive 0 across 4 core crates
    # (lib-only) under fresh nightly 1.97 + Miri Tree-Borrows. See
    # STEP17_FINDINGS Stage 4b LANDED section for the empirical evidence
    # + 3 false-positive sources we surveyed (toolchain churn, Miri model
    # change, dep update). single-user vais repo policy: PR-block + revert
    # on first failure rather than 7-day passive accumulation.
    #
    # Lib-only is intentional — proptest fuzz tests are NOT included
    # here; they belong to the matrix above (fuzz_lexer / fuzz_parser /
    # etc.) which has its own runtime budget.
    #
    # Revert policy if Miri ever turns up red:
    # 1. Suffix the failing line with ` || true` to immediately unblock
    #    PRs (commit message: "phase2-step17-stage4b-revert: ...").
    # 2. File STEP17_FINDINGS finding F-MIR-NN with the Miri output.
    # 3. Triage as either real UB (compiler fix) or Miri false-positive
    #    (toolchain pin / sanitizer narrow scope).
    # 4. Re-promote after fix.
    name: Miri Undefined Behavior Check (PR-blocking; lib only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust nightly with miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri, rust-src

      - name: Install LLVM 17
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-17-dev libpolly-17-dev

      - name: Run miri on core crates (lib-only, fail-fast)
        run: |
          cargo +nightly miri test -p vais-lexer  --lib -- --test-threads=1
          cargo +nightly miri test -p vais-parser --lib -- --test-threads=1
          cargo +nightly miri test -p vais-ast    --lib -- --test-threads=1
          cargo +nightly miri test -p vais-types  --lib -- --test-threads=1
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-tree-borrows"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo deny
        run: cargo deny check
